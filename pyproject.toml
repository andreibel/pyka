[project]
name = "pyka"
version = "0.1.0"
description = "pyKA — a mini Kafka: append-only log storage + an asyncio broker, built to learn"
requires-python = ">=3.12"
dependencies = []

[dependency-groups]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pyka"]
